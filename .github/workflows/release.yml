name: Release APK

# Build the APK and attach it to a GitHub Release for sideloading. Trigger either
# by pushing a tag (e.g. `git tag v1.0.0 && git push origin v1.0.0`) or by running
# this workflow manually from the Actions tab and supplying a tag name.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Builds the debug APK so the released artifact is installable without a
      # keystore. To publish a signed release APK instead, add the signing config
      # described in the README and supply the keystore via repository secrets.
      - name: Assemble APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK with tag
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk "dist/revline-${{ steps.vars.outputs.tag }}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Revline ${{ steps.vars.outputs.tag }}
          files: dist/revline-*.apk
          generate_release_notes: true
