name: Release APK

# Tag a release (e.g. `git tag v1.0.0 && git push origin v1.0.0`) to build the
# APK and attach it to a GitHub Release for sideloading.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Builds the debug APK so the released artifact is installable without a
      # keystore. To publish a signed release APK instead, add the signing config
      # described in the README and supply the keystore via repository secrets.
      - name: Assemble APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK with tag
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk "dist/revline-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/revline-*.apk
          generate_release_notes: true
